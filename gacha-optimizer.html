*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0e0e12;--card:#16161d;--card2:#1c1c26;--border:#2a2a3a;--text:#e0dfe6;--dim:#6b6b80;--accent:#c9a24e;--accent2:#e8c36a;--green:#2ecc71;--red:#e74c3c;--blue:#3498db;--purple:#9b59b6}

.section{margin-bottom:20px}
.section-title{font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.section-title .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.cat-Class .dot{background:#c9a24e}.cat-Type .dot{background:#2ecc71}.cat-Element .dot{background:#e74c3c}.cat-Terrain .dot{background:#3498db}

.pills{display:flex;flex-wrap:wrap;gap:6px}
.pill{padding:6px 14px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;user-select:none;font-family:'Noto Sans',sans-serif}
.pill:hover{border-color:#555}
.pill.on{color:#fff;border-color:currentColor}
.cat-Class .pill.on{color:#c9a24e;background:#c9a24e18;border-color:#c9a24e}
.cat-Type .pill.on{color:#2ecc71;background:#2ecc7118;border-color:#2ecc71}
.cat-Element .pill.on{color:#e74c3c;background:#e74c3c18;border-color:#e74c3c}
.cat-Terrain .pill.on{color:#3498db;background:#3498db18;border-color:#3498db}
.controls{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border-radius:10px;border:1px solid var(--border);margin-bottom:20px}
.controls label{font-size:13px;color:var(--dim);white-space:nowrap}
.controls input[type=range]{flex:1;accent-color:var(--accent)}
.controls .val{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:600;min-width:28px;text-align:center;color:var(--accent)}
.best{padding:16px 20px;border-radius:10px;margin-bottom:20px;background:linear-gradient(135deg,#c9a24e12,#2ecc7112);border:1.5px solid #c9a24e40}
.best .label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.best .row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.best .pct{font-family:'Chakra Petch',sans-serif;font-size:32px;font-weight:700;color:var(--accent)}
.best .info{font-size:13px;color:var(--dim)}
.empty{text-align:center;padding:48px 16px;color:var(--dim);font-size:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{font-family:'Chakra Petch',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:10px 8px;color:var(--dim);border-bottom:1.5px solid var(--border);text-align:center;position:sticky;top:0;background:var(--bg);z-index:1}

.unit-names{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5}
.tbl-wrap{border:1px solid var(--border);border-radius:10px;overflow:hidden;max-height:70vh;overflow-y:auto}
.footer{margin-top:10px;font-size:11px;color:#444;text-align:right}

  document.getElementById("maxVal").textContent=mp;
  document.getElementById("maxPicks").max=Math.min(available.length,5);
  if(!available.length){document.getElementById("emptyMsg").style.display="";document.getElementById("tblWrap").style.display="none";document.getElementById("bestBox").style.display="none";document.getElementById("footer").textContent="";return}
  const results=[];
  for(let k=0;k<=mp;k++){const cs=k===0?[[]]:combs(available,k);for(const c of cs){if(conflict(c))continue;const r=analyze(c);results.push(r)}}
  results.sort((a,b)=>b.pct-a.pct||b.s3-a.s3);
  const best=results[0];
  document.getElementById("emptyMsg").style.display="none";
  document.getElementById("tblWrap").style.display="";
  document.getElementById("bestBox").style.display="";
  document.getElementById("bestPct").textContent=best.pct.toFixed(1)+"%";
  document.getElementById("bestInfo").textContent=(best.attrs.length?best.attrs.join(" + "):"None")+" → "+best.s3+"× 3★ / "+best.total+" total";
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  results.forEach((r,i)=>{
    const tr=document.createElement("tr");
    if(i===0)tr.className="top";
    const tags=r.attrs.length?r.attrs.map(a=>`<span class="tag tag-${CAT[a]}">${a}</span>`).join(""):`<span class="none-tag">None</span>`;
    const pc=r.pct>=40?"pct-hi":r.pct>=25?"pct-mid":"pct-lo";
    tr.innerHTML=`<td>${i+1}</td><td><div>${tags}</div><div class="unit-names" style="display:none">3★: ${r.names3.join(", ")||"—"}</div></td><td class="${pc}">${r.total?r.pct.toFixed(1):"—"}</td><td class="s3">${r.s3}</td><td>${r.s2}</td><td>${r.s1}</td><td>${r.s0}</td><td>${r.total}</td>`;
    tr.onclick=()=>{const n=tr.querySelector(".unit-names");n.style.display=n.style.display==="none"?"block":"none"};
    tbody.appendChild(tr);
  });
  document.getElementById("footer").textContent=results.length+" combinations · click row for 3★ names";
}

Object.entries(ALL).forEach(([cat,attrs])=>{
  const box=document.getElementById("pills-"+cat);
  attrs.forEach(a=>{
    const btn=document.createElement("button");
    btn.className="pill";btn.textContent=a;
    btn.onclick=()=>{
      if(available.includes(a)){available=available.filter(x=>x!==a);btn.classList.remove("on")}
      else{available.push(a);btn.classList.add("on")}
      render();
    };
    box.appendChild(btn);
  });
});
document.getElementById("maxPicks").oninput=e=>{maxPicks=+e.target.value;render()};
render();
</script>
